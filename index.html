<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1a0f">
<title>Trail & Wall — 12-Week Plan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1a0f;
    --bg2: #172117;
    --bg3: #1e2b1e;
    --card: #1b261b;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8f0e8;
    --text2: #8fa88f;
    --text3: #5a6e5a;
    --accent: #7ec87e;
    --accent2: #4a9e4a;
    --amber: #d4a84b;
    --amber2: #f0c96e;
    --blue: #5b9bd5;
    --rose: #d46b8a;
    --teal: #4ab5a0;
    --radius: 14px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { background: var(--bg); }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    overflow-x: hidden;
  }

  /* NAV BAR */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15,26,15,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--accent); letter-spacing: -0.3px; }
  .topbar-sub { font-size: 11px; color: var(--text3); letter-spacing: .06em; text-transform: uppercase; }

  /* PHASE SELECTOR */
  .phase-scroll {
    display: flex;
    gap: 8px;
    padding: 16px 20px 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .phase-scroll::-webkit-scrollbar { display: none; }
  .phase-chip {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    font-size: 13px;
    font-weight: 400;
    color: var(--text2);
    background: var(--bg3);
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .phase-chip.active {
    background: var(--accent);
    color: #0f1a0f;
    border-color: var(--accent);
    font-weight: 500;
  }

  /* PHASE HEADER */
  .phase-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
  }
  .phase-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 8px;
  }
  .p1 .phase-tag { background: rgba(126,200,126,0.15); color: var(--accent); }
  .p2 .phase-tag { background: rgba(212,168,75,0.15); color: var(--amber); }
  .p3 .phase-tag { background: rgba(91,155,213,0.15); color: var(--blue); }
  .p4 .phase-tag { background: rgba(212,107,138,0.15); color: var(--rose); }
  .phase-name { font-family: 'DM Serif Display', serif; font-size: 24px; color: var(--text); margin-bottom: 8px; }
  .phase-desc { font-size: 13px; color: var(--text2); line-height: 1.65; }
  .focus-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .focus-pill {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    color: var(--text3);
  }

  /* PROGRESS BAR */
  .progress-section { padding: 14px 20px 0; }
  .progress-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .progress-label { font-size: 12px; color: var(--text3); }
  .progress-pct { font-size: 12px; font-weight: 500; color: var(--accent); }
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s ease; }

  /* DAY LIST */
  .day-list { padding: 12px 20px 100px; }
  .section-label {
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--text3);
    font-weight: 500;
    padding: 16px 0 8px;
  }
  .day-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .day-card.open { border-color: var(--border2); }
  .day-header {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    gap: 10px;
  }
  .day-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-rest { background: var(--text3); }
  .dot-easy { background: var(--accent2); }
  .dot-medium { background: var(--amber); }
  .dot-hard { background: var(--rose); }
  .day-name { font-size: 15px; font-weight: 500; flex: 1; }
  .day-tags-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .dtag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 500;
  }
  .dtag-pt { background: rgba(212,107,138,0.18); color: var(--rose); }
  .dtag-yoga { background: rgba(74,181,160,0.18); color: var(--teal); }
  .dtag-stretch { background: rgba(126,200,126,0.18); color: var(--accent); }
  .dtag-strength { background: rgba(91,155,213,0.18); color: var(--blue); }
  .dtag-rest { background: rgba(255,255,255,0.06); color: var(--text3); }
  .dtag-hike { background: rgba(212,168,75,0.18); color: var(--amber); }
  .dtag-climb { background: rgba(212,107,138,0.18); color: var(--rose); }
  .chevron-icon {
    font-size: 12px;
    color: var(--text3);
    transition: transform .2s;
    flex-shrink: 0;
  }
  .day-card.open .chevron-icon { transform: rotate(180deg); }

  /* DAY DETAIL */
  .day-detail {
    display: none;
    padding: 0 16px 14px;
    border-top: 1px solid var(--border);
  }
  .day-card.open .day-detail { display: block; }
  .block-title {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 12px 0 6px;
  }
  .block-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .bd-pt { background: var(--rose); }
  .bd-yoga { background: var(--teal); }
  .bd-stretch { background: var(--accent); }
  .bd-strength { background: var(--blue); }
  .bd-hike { background: var(--amber); }
  .bd-climb { background: var(--rose); }

  .ex-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .ex-row:last-child { border-bottom: none; }
  .ex-checkbox {
    width: 20px; height: 20px;
    border-radius: 6px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .ex-checkbox.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .ex-checkbox.checked::after {
    content: '';
    display: block;
    width: 5px; height: 9px;
    border-right: 2px solid #0f1a0f;
    border-bottom: 2px solid #0f1a0f;
    transform: rotate(45deg) translate(-1px,-1px);
  }
  .ex-text { flex: 1; }
  .ex-name { font-size: 14px; color: var(--text); line-height: 1.4; }
  .ex-row.checked .ex-name { color: var(--text3); text-decoration: line-through; }
  .ex-detail { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .weight-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
  }
  .weight-label { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .weight-input {
    width: 72px;
    padding: 4px 8px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    -webkit-appearance: none;
  }
  .weight-input:focus { border-color: var(--accent2); }
  .weight-unit { font-size: 11px; color: var(--text3); }
  .note-box {
    background: rgba(126,200,126,0.07);
    border-left: 2px solid var(--accent2);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--text2);
    line-height: 1.6;
    margin-top: 10px;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    background: rgba(15,26,15,0.95);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 10px 0 max(10px, env(safe-area-inset-bottom));
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    padding: 4px 0;
    border: none;
    background: none;
    color: var(--text3);
    transition: color .15s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-icon { font-size: 20px; }
  .nav-label { font-size: 10px; font-weight: 500; letter-spacing: .04em; }

  /* TODAY VIEW */
  .today-hero {
    padding: 20px 20px 0;
  }
  .today-greeting { font-size: 12px; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 4px; }
  .today-heading { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--text); margin-bottom: 4px; }
  .today-sub { font-size: 14px; color: var(--text2); }
  .today-ring {
    margin: 20px auto;
    position: relative;
    width: 120px; height: 120px;
  }
  .today-ring svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 8; }
  .ring-fill { fill: none; stroke: var(--accent); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset .5s ease; }
  .ring-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    text-align: center;
  }
  .ring-pct { font-size: 22px; font-weight: 500; color: var(--text); }
  .ring-sub { font-size: 11px; color: var(--text3); }

  /* STATS VIEW */
  .stats-content { padding: 20px; }
  .stat-section-title { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); margin-bottom: 16px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }
  .stat-val { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--text); }
  .stat-lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .phase-progress-list { display: flex; flex-direction: column; gap: 10px; }
  .phase-prog-row { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
  .phase-prog-name { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
  .phase-prog-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .phase-prog-fill { height: 100%; border-radius: 2px; transition: width .4s; }
  .pf1 { background: var(--accent); }
  .pf2 { background: var(--amber); }
  .pf3 { background: var(--blue); }
  .pf4 { background: var(--rose); }
  .phase-prog-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); margin-top: 5px; }

  /* RESET BTN */
  .clear-day-btn {
    display: block;
    width: 100%;
    margin-top: 12px;
    padding: 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text3);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    letter-spacing: .04em;
    transition: all .15s;
  }
  .clear-day-btn:active {
    background: var(--bg3);
    color: var(--text2);
  }
  .reset-btn {
    width: 100%;
    padding: 13px;
    border-radius: var(--radius-sm);
    border: 1px solid rgba(212,107,138,0.3);
    background: transparent;
    color: var(--rose);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
  }

  /* VIEWS */
  .view { display: none; }
  .view.active { display: block; }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .view.active { animation: fadeIn .2s ease; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">Trail & Wall</div>
    <div class="topbar-sub">12-Week Program</div>
  </div>
  <div style="font-size:22px;opacity:.6">⛰</div>
</div>

<!-- TODAY VIEW -->
<div class="view active" id="view-today">
  <div class="today-hero">
    <div class="today-greeting" id="today-greeting">Today</div>
    <div class="today-heading" id="today-heading">Week 1 · Monday</div>
    <div class="today-sub" id="today-sub">Foundation &amp; Release</div>
  </div>

  <div style="display:flex;justify-content:center;">
    <div class="today-ring">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle class="ring-bg" cx="60" cy="60" r="52"/>
        <circle class="ring-fill" id="today-ring" cx="60" cy="60" r="52" stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
      </svg>
      <div class="ring-label">
        <div class="ring-pct" id="today-pct">0%</div>
        <div class="ring-sub">today</div>
      </div>
    </div>
  </div>

  <div class="day-list" id="today-day-list"></div>
</div>

<!-- PLAN VIEW -->
<div class="view" id="view-plan">
  <div class="phase-scroll" id="phase-chips"></div>
  <div id="phase-header-area"></div>
  <div class="progress-section">
    <div class="progress-row">
      <span class="progress-label">Phase progress</span>
      <span class="progress-pct" id="plan-progress-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="plan-progress-fill" style="width:0%"></div></div>
  </div>
  <div class="day-list" id="plan-day-list"></div>
</div>

<!-- STATS VIEW -->
<div class="view" id="view-stats">
  <div class="stats-content">
    <div class="stat-section-title">Your progress</div>
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-val" id="stat-total">0</div>
        <div class="stat-lbl">exercises done</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-pct">0%</div>
        <div class="stat-lbl">overall complete</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-days">0</div>
        <div class="stat-lbl">days touched</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-streak">🔥0</div>
        <div class="stat-lbl">week streak</div>
      </div>
    </div>
    <div class="phase-progress-list" id="phase-prog-list"></div>
    <button class="reset-btn" onclick="confirmReset()">Reset all progress</button>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-today" onclick="switchView('today')">
    <span class="nav-icon">☀</span>
    <span class="nav-label">Today</span>
  </button>
  <button class="nav-btn" id="nav-plan" onclick="switchView('plan')">
    <span class="nav-icon">📋</span>
    <span class="nav-label">Plan</span>
  </button>
  <button class="nav-btn" id="nav-stats" onclick="switchView('stats')">
    <span class="nav-icon">📊</span>
    <span class="nav-label">Progress</span>
  </button>
</div>

<script>
// ──────────────────────────────────────────
// DATA
// ──────────────────────────────────────────
const PHASES = [
  {
    id:1,
    label:"Phase 1",
    name:"Foundation & Release",
    cls:"p1",
    weeks:"Weeks 1–3",
    badge:"Weeks 1–3",
    desc:"Priority is loosening the psoas, hip flexors, and lower back while reactivating dormant glutes. Daily yoga + PT exercises + gentle full-body conditioning. KB sessions 4 mornings a week at foundation intensity — technique and movement pattern over load.",

              {n:"KB swing (two-hand)",d:"3 × 10 — hip drive and posterior chain, builds power for push-off on footholds"},

          {

      },
      Wednesday:{
        tags:["pt", "strength", "stretch"],
        diff:"medium",
        blocks:[
          {
            type:"strength",
            title:"KB Morning · Climbing Circuit B · 30 min",
            ex:[
              {n:"KB clean",d:"3 × 6 each side — grip, coordination, forearm endurance through the catch"},
              {n:"KB goblet squat",d:"3 × 10 — lower body push strength, hip mobility at depth"},

const DAYS_ORDER = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const TAG_CLS = {pt:"dtag-pt",yoga:"dtag-yoga",stretch:"dtag-stretch",strength:"dtag-strength",rest:"dtag-rest",hike:"dtag-hike",climb:"dtag-climb"};
const TAG_LABEL = {pt:"PT",yoga:"Yoga",stretch:"Stretch",strength:"Strength",rest:"Rest",hike:"Hike",climb:"Climbing"};
const DIFF_DOT = {rest:"dot-rest",easy:"dot-easy",medium:"dot-medium",hard:"dot-hard"};

// STATE
// ──────────────────────────────────────────
let checked = JSON.parse(localStorage.getItem('tw_checked') || '{}');
let currentPhaseIdx = parseInt(localStorage.getItem('tw_phase') || '0');

function saveState() {
  localStorage.setItem('tw_checked', JSON.stringify(checked));
  localStorage.setItem('tw_phase', currentPhaseIdx);
}

// ──────────────────────────────────────────
// HELPERS
// ──────────────────────────────────────────
function exKey(phaseId, day, blockIdx, exIdx) {
  return `p${phaseId}_${day}_${blockIdx}_${exIdx}`;
}

function countPhase(phase) {
  let total = 0, done = 0;
  DAYS_ORDER.forEach(day => {
    const ddata = phase.days[day];
    ddata.blocks.forEach((blk, bi) => {
      blk.ex.forEach((ex, ei) => {
        total++;
        if (checked[exKey(phase.id, day, bi, ei)]) done++;
      });
    });
  });
  return {total, done};
}

function countAll() {
  let total = 0, done = 0;
  PHASES.forEach(p => {
    const c = countPhase(p);
    total += c.total;
    done += c.done;
  });
  return {total, done};
}

function countDaysTouched() {
  const touched = new Set();
  Object.keys(checked).forEach(k => {
    if (checked[k]) {
      const parts = k.split('_');
      touched.add(parts[0] + '_' + parts[1]);
    }
  });
  return touched.size;
}

function getTodayDay() {
  const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  return days[new Date().getDay()];
}

// ──────────────────────────────────────────
// RENDER HELPERS
// ──────────────────────────────────────────
function buildDayCard(phase, dayName, dayData, isToday) {
  const tags = dayData.tags.map(t => `<span class="dtag ${TAG_CLS[t]}">${TAG_LABEL[t]}</span>`).join('');
  const dot = DIFF_DOT[dayData.diff] || 'dot-easy';

  // Exercises that get a weight tracking input
  const WEIGHTED_KW = ['swing','deadlift','squat','row','press','clean','snatch',
    'lunge','turkish','windmill','renegade','high pull','curl','extension',
    'bridge','hip thrust','skull','pullover','suitcase','hang','pinch',
    'bottoms-up','repeater','max hang','weighted','rdl'];
  const EXCLUDE_KW = ['mountain climber','jumping','clamshell','fire hydrant',
    'donkey kick','dead bug','plank drag','hollow','push-up','pull-up',
    'extensor','halo','hip circle','cat-cow','superman','monster walk','band'];
  function isWeighted(name) {
    const n = name.toLowerCase();
    if (EXCLUDE_KW.some(kw => n.includes(kw))) return false;
    return WEIGHTED_KW.some(kw => n.includes(kw));
  }

  let blocksHtml = '';
  dayData.blocks.forEach((blk, bi) => {
    const items = blk.ex.map((ex, ei) => {
      const key = exKey(phase.id, dayName, bi, ei);
      const wkey = `w_p${phase.id}_${dayName}_${bi}_${ei}`;
      const isDone = !!checked[key];
      const savedWeight = checked[wkey] || '';
      const weighted = isWeighted(ex.n);

      const weightHtml = weighted
        ? `<div class="weight-row">
            <span class="weight-label">Last weight:</span>
            <input class="weight-input" type="number" inputmode="decimal"
              placeholder="0" value="${savedWeight}"
              onclick="event.stopPropagation()"
              onchange="saveWeight('${wkey}',this.value)"
              ontouchend="event.stopPropagation()">
            <span class="weight-unit">lb</span>
           </div>`
        : '';

      return `<div class="ex-row ${isDone?'checked':''}" onclick="toggleEx('${key}', this)">
        <div class="ex-checkbox ${isDone?'checked':''}"></div>
        <div class="ex-text">
          <div class="ex-name">${ex.n}</div>
          <div class="ex-detail">${ex.d}</div>
          ${weightHtml}
        </div>
      </div>`;
    }).join('');
    blocksHtml += `<div class="block-title"><span class="block-dot bd-${blk.type}"></span>${blk.title}</div>${items}`;
  });

  const note = dayData.note ? `<div class="note-box">${dayData.note}</div>` : '';
  const clearBtn = `<button class="clear-day-btn" onclick="clearDay(${phase.id},'${dayName}',this);event.stopPropagation()">Clear checkmarks</button>`;

  return `<div class="day-card" data-phase="${phase.id}" data-day="${dayName}">
    <div class="day-header" onclick="toggleCard(this.parentElement)">
      <span class="day-dot ${dot}"></span>
      <span class="day-name">${dayName}</span>
      <div class="day-tags-row">${tags}</div>
      <span class="chevron-icon">▾</span>
    </div>
    <div class="day-detail">${blocksHtml}${note}${clearBtn}</div>
  </div>`;
}

function saveWeight(wkey, val) {
  checked[wkey] = val;
  saveState();
}

function clearDay(phaseId, dayName, btn) {
  const phase = PHASES.find(p => p.id === phaseId);
  if (!phase) return;
  const dayData = phase.days[dayName];
  // Clear ONLY check state — weight inputs are untouched
  dayData.blocks.forEach((blk, bi) => {
    blk.ex.forEach((ex, ei) => {
      checked[exKey(phaseId, dayName, bi, ei)] = false;
    });
  });
  saveState();
  const card = btn.closest('.day-card');
  card.querySelectorAll('.ex-row').forEach(row => {
    row.classList.remove('checked');
    row.querySelector('.ex-checkbox').classList.remove('checked');
  });
  updateTodayRing();
  updatePlanProgress();
  updateStats();
}

function toggleCard(card) {
  card.classList.toggle('open');
}

function toggleEx(key, row) {
  checked[key] = !checked[key];
  row.classList.toggle('checked', checked[key]);
  row.querySelector('.ex-checkbox').classList.toggle('checked', checked[key]);
  saveState();
  updateTodayRing();
  updatePlanProgress();
  updateStats();
}

function renderToday() {
  const todayDay = getTodayDay();
  const phase = PHASES[currentPhaseIdx];
  const dayData = phase.days[todayDay];

  document.getElementById('today-greeting').textContent = 'Today · ' + new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'});
  document.getElementById('today-heading').textContent = phase.badge + ' · ' + todayDay;
  document.getElementById('today-sub').textContent = phase.name;

  const list = document.getElementById('today-day-list');
  list.innerHTML = `<div class="section-label">Today's workout</div>` + buildDayCard(phase, todayDay, dayData, true);
  // Auto-open the card
  setTimeout(() => {
    const card = list.querySelector('.day-card');
    if (card) card.classList.add('open');
  }, 50);

  updateTodayRing();
}

function updateTodayRing() {
  const todayDay = getTodayDay();
  const phase = PHASES[currentPhaseIdx];
  const dayData = phase.days[todayDay];
  let total = 0, done = 0;
  dayData.blocks.forEach((blk, bi) => {
    blk.ex.forEach((ex, ei) => {
      total++;
      if (checked[exKey(phase.id, todayDay, bi, ei)]) done++;
    });
  });
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  const circ = 326.7;
  const offset = circ - (circ * pct / 100);
  document.getElementById('today-ring').style.strokeDashoffset = offset;
  document.getElementById('today-pct').textContent = pct + '%';
}

}

function updatePlanProgress() {
  const phase = PHASES[currentPhaseIdx];
  const {total, done} = countPhase(phase);
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('plan-progress-pct').textContent = pct + '%';
  document.getElementById('plan-progress-fill').style.width = pct + '%';
}

function setPhase(i) {
  currentPhaseIdx = i;
  saveState();
  renderPlanChips();
  renderPhaseHeader();
  renderPlanDays();
  renderToday();
}

// ──────────────────────────────────────────
// STATS VIEW
// ──────────────────────────────────────────
function updateStats() {
  const {total, done} = countAll();
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('stat-total').textContent = done;
  document.getElementById('stat-pct').textContent = pct + '%';
  document.getElementById('stat-days').textContent = countDaysTouched();
  document.getElementById('stat-streak').textContent = '🔥' + getWeekStreak();

  const phaseColors = ['pf1','pf2','pf3','pf4'];
  const phaseCls = ['p1','p2','p3','p4'];
  const list = document.getElementById('phase-prog-list');
  list.innerHTML = PHASES.map((p, i) => {
    const c = countPhase(p);
    const pc = c.total > 0 ? Math.round(c.done/c.total*100) : 0;
    return `<div class="phase-prog-row ${phaseCls[i]}">
      <div class="phase-prog-name">${p.label}: ${p.name}</div>
      <div class="phase-prog-bar"><div class="phase-prog-fill ${phaseColors[i]}" style="width:${pc}%"></div></div>
      <div class="phase-prog-meta"><span>${p.badge}</span><span>${c.done}/${c.total} exercises</span></div>
    </div>`;
  }).join('');
}

function getWeekStreak() {
  // Simple: count how many days in current week have at least 1 checked item
  const touched = new Set();
  Object.keys(checked).forEach(k => {
    if (checked[k]) {
      const parts = k.split('_');
      touched.add(parts[0] + '_' + parts[1]);
    }
  });
  return Math.floor(touched.size / 2); // rough proxy
}

function confirmReset() {
  if (confirm('Reset all progress? This cannot be undone.')) {
    checked = {};
    saveState();
    init();
  }
}

// ──────────────────────────────────────────
// NAVIGATION
// ──────────────────────────────────────────
let currentView = 'today';
function switchView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.getElementById('nav-' + v).classList.add('active');
  currentView = v;
  if (v === 'stats') updateStats();
}

// ──────────────────────────────────────────
// INIT
// ──────────────────────────────────────────
function init() {
  renderPlanChips();
  renderPhaseHeader();
  renderPlanDays();
  renderToday();
  updateStats();
}

init();
</script>
</body>
</html>
